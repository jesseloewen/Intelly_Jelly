<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelly Jelly - Media Organizer</title>
    <link rel="stylesheet" href="/static/themes.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            padding: 20px 30px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        h1 {
            font-size: 28px;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .nav-links {
            display: flex;
            gap: 15px;
        }
        
        .nav-links a {
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background 0.3s;
        }
        
        .stats {
            padding: 20px 30px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-evenly;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .stat-item {
            min-width: 150px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary-color);
        }
        
        .stat-label {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 5px;
        }
        
        .jobs-container {
            padding: 30px;
            border-radius: 10px;
        }
        
        .jobs-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .jobs-header h2 {
            color: var(--text-primary);
        }
        
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        
        .refresh-btn:hover {
            background: #5568d3;
        }
        
        .jobs-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .jobs-table th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }
        
        .jobs-table td {
            padding: 12px;
        }
        
        .jobs-table tr:hover {
            background: var(--table-row-hover);
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-queued { background: var(--status-queued-bg); color: var(--status-queued-text); }
        .status-processing { background: var(--status-processing-bg); color: var(--status-processing-text); }
        .status-pending { background: var(--status-pending-bg); color: var(--status-pending-text); }
        .status-completed { background: var(--status-completed-bg); color: var(--status-completed-text); }
        .status-failed { background: var(--status-failed-bg); color: var(--status-failed-text); }
        .status-manual { background: var(--status-manual-bg); color: var(--status-manual-text); }
        
        .error-message {
            padding: 12px;
            font-size: 13px;
        }
        
        .actions {
            display: flex;
            gap: 8px;
        }
        
        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: opacity 0.3s;
        }
        
        .btn:hover {
            opacity: 0.8;
        }
        
        .btn-edit {
            background: #74b9ff;
            color: white;
        }
        
        .btn-reai {
            background: #a29bfe;
            color: white;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            padding: 30px;
            border-radius: 10px;
            max-width: 550px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .modal-header h3 {
            color: var(--heading-color);
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-primary);
            font-weight: 600;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--input-border);
            border-radius: 5px;
            font-size: 14px;
            background: var(--input-bg);
            color: var(--input-text);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 10px;
            background: var(--table-header-bg);
            border-radius: 5px;
            margin-top: 8px;
        }
        
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-weight: 400;
            color: var(--text-primary);
        }
        
        .checkbox-label input[type="checkbox"] {
            width: auto;
            cursor: pointer;
            margin: 0;
        }
        
        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .btn-secondary {
            background: var(--table-header-bg);
            color: var(--text-primary);
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        /* Mobile Portrait Optimizations */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .container {
                max-width: 100%;
            }
            
            header {
                padding: 15px;
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .header-left,
            .header-right {
                width: 100%;
                flex-direction: column;
            }
            
            h1 {
                font-size: 22px;
            }
            
            .nav-links {
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
            }
            
            .nav-links a {
                padding: 8px 16px;
                font-size: 14px;
            }
            
            .stats {
                padding: 15px;
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            
            .stat-value {
                font-size: 24px;
            }
            
            .stat-label {
                font-size: 12px;
            }
            
            .jobs-container {
                padding: 15px;
                overflow-x: auto;
            }
            
            .jobs-header {
                flex-direction: column;
                gap: 10px;
                align-items: stretch;
            }
            
            .jobs-header h2 {
                font-size: 18px;
                text-align: center;
            }
            
            .refresh-btn {
                width: 100%;
            }
            
            .jobs-table {
                font-size: 12px;
                min-width: 600px;
            }
            
            .jobs-table th,
            .jobs-table td {
                padding: 8px 6px;
            }
            
            .status-badge {
                font-size: 10px;
                padding: 3px 8px;
            }
            
            .actions {
                flex-direction: column;
                gap: 4px;
            }
            
            .btn {
                font-size: 11px;
                padding: 5px 10px;
                width: 100%;
            }
            
            .modal-content {
                width: 95%;
                max-width: 95%;
                padding: 20px;
                max-height: 90vh;
                overflow-y: auto;
            }
            
            .modal-header h3 {
                font-size: 18px;
            }
            
            .form-group label {
                font-size: 14px;
            }
            
            .form-group input,
            .form-group textarea {
                font-size: 14px;
            }
            
            .form-actions {
                flex-direction: column;
                gap: 10px;
            }
            
            .btn-primary,
            .btn-secondary {
                width: 100%;
                padding: 12px;
            }
            
            .empty-state-icon {
                font-size: 48px;
            }
        }
        
        /* Tablet and Small Desktop Optimizations */
        @media (min-width: 769px) and (max-width: 1024px) {
            .container {
                max-width: 100%;
            }
            
            header {
                padding: 20px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .stats {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .jobs-container {
                padding: 20px;
            }
            
            .jobs-table {
                font-size: 13px;
            }
            
            .modal-content {
                max-width: 600px;
            }
        }
        
        /* Large Desktop Optimizations */
        @media (min-width: 1400px) {
            .container {
                max-width: 1600px;
            }
            
            .stats {
                grid-template-columns: repeat(6, 1fr);
            }
            
            .jobs-table th,
            .jobs-table td {
                padding: 14px;
            }
        }
        
        /* Landscape Mobile Optimizations */
        @media (max-width: 768px) and (orientation: landscape) {
            body {
                padding: 10px;
            }
            
            header {
                flex-direction: row;
                padding: 10px 15px;
            }
            
            h1 {
                font-size: 20px;
            }
            
            .stats {
                grid-template-columns: repeat(3, 1fr);
                padding: 10px;
            }
            
            .stat-value {
                font-size: 20px;
            }
            
            .modal-content {
                max-height: 85vh;
            }
        }
        
        .filter-bar {
            padding: 15px 30px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .filter-bar .search-wrapper {
            position: relative;
            flex: 1;
            min-width: 180px;
        }
        
        .filter-bar .search-wrapper input {
            width: 100%;
            padding: 8px 12px 8px 36px;
            border: 1px solid var(--input-border);
            border-radius: 6px;
            font-size: 14px;
            background: var(--input-bg);
            color: var(--input-text);
        }
        
        .filter-bar .search-wrapper input:focus {
            border-color: var(--primary-color);
            outline: none;
        }
        
        .filter-bar .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 14px;
            pointer-events: none;
        }
        
        .filter-bar .clear-search {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 16px;
            display: none;
            padding: 2px 6px;
            border-radius: 50%;
        }
        
        .filter-bar .clear-search:hover {
            color: var(--text-primary);
            background: var(--table-row-hover);
        }
        
        .filter-bar .status-chips {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        
        .filter-chip {
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            user-select: none;
        }
        
        .filter-chip:hover {
            opacity: 0.85;
        }
        
        .filter-chip.inactive {
            opacity: 0.35;
            filter: grayscale(30%);
        }
        
        .filter-chip.chip-queued {
            background: var(--status-queued-bg);
            color: var(--status-queued-text);
        }
        
        .filter-chip.chip-processing {
            background: var(--status-processing-bg);
            color: var(--status-processing-text);
        }
        
        .filter-chip.chip-pending {
            background: var(--status-pending-bg);
            color: var(--status-pending-text);
        }
        
        .filter-chip.chip-failed {
            background: var(--status-failed-bg);
            color: var(--status-failed-text);
        }
        
        .filter-divider {
            width: 1px;
            height: 24px;
            background: var(--border-color);
        }
        
        .filter-count {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        
        .jobs-table th.sortable {
            cursor: pointer;
            user-select: none;
        }
        
        .jobs-table th.sortable:hover {
            color: var(--primary-color);
        }
        
        .sort-arrow {
            font-size: 10px;
            margin-left: 4px;
            opacity: 0.5;
        }
        
        .sort-arrow.active {
            opacity: 1;
            color: var(--primary-color);
        }
        
        @media (max-width: 768px) {
            .filter-bar {
                padding: 12px 15px;
                flex-direction: column;
                align-items: stretch;
            }
            
            .filter-bar .search-wrapper {
                max-width: none;
            }
            
            .filter-bar .status-chips {
                justify-content: center;
            }
            
            .filter-count {
                text-align: center;
            }
        }
        
        .ai-monitor {
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            background: var(--card-bg);
        }
        
        .ai-monitor-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid var(--border-color);
            background: var(--table-header-bg);
        }
        
        .ai-monitor-header:hover {
            background: var(--table-row-hover);
        }
        
        .ai-monitor-header .monitor-title {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .ai-monitor-header .monitor-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .monitor-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        
        .monitor-dot.connected {
            background: #00b894;
            box-shadow: 0 0 6px rgba(0, 184, 148, 0.5);
        }
        
        .monitor-dot.disconnected {
            background: #d63031;
            box-shadow: 0 0 6px rgba(214, 48, 49, 0.5);
        }
        
        .monitor-dot.idle {
            background: var(--text-secondary);
        }
        
        .ai-monitor-header .toggle-arrow {
            font-size: 12px;
            color: var(--text-secondary);
            transition: transform 0.2s;
        }
        
        .ai-monitor.collapsed .toggle-arrow {
            transform: rotate(-90deg);
        }
        
        .ai-monitor-body {
            max-height: 350px;
            overflow-y: auto;
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
            font-size: 12px;
            line-height: 1.6;
            padding: 10px 16px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .ai-monitor.collapsed .ai-monitor-body {
            display: none;
        }
        
        .ai-monitor-body::-webkit-scrollbar {
            width: 6px;
        }
        
        .ai-monitor-body::-webkit-scrollbar-track {
            background: var(--input-bg);
        }
        
        .ai-monitor-body::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }
        
        .ai-event {
            padding: 2px 0;
            white-space: nowrap;
        }
        
        .ai-event .event-time {
            color: var(--text-secondary);
            opacity: 0.6;
            margin-right: 8px;
        }
        
        .ai-event .event-icon {
            margin-right: 6px;
            display: inline-block;
            width: 16px;
            text-align: center;
        }
        
        .ai-event .event-msg {
            color: var(--text-primary);
        }
        
        .ai-event.type-job_started .event-msg {
            color: var(--primary-color);
            font-weight: 600;
        }
        
        .ai-event.type-job_done .event-msg {
            color: #00b894;
            font-weight: 600;
        }
        
        .ai-event.type-job_error .event-msg {
            color: #d63031;
        }
        
        .ai-event.type-api_request .event-msg {
            color: var(--text-secondary);
        }
        
        .ai-event.type-api_response .event-msg {
            color: var(--text-secondary);
        }
        
        .ai-event.type-tool_started .event-msg {
            color: #6c5ce7;
        }
        
        .ai-event.type-result .event-msg {
            color: #fdcb6e;
        }
        
        .ai-monitor-empty {
            color: var(--text-secondary);
            font-style: italic;
            padding: 8px 0;
        }
        
        @media (max-width: 768px) {
            .ai-monitor {
                border-radius: 6px;
            }
            
            .ai-monitor .ai-monitor.collapsed .ai-monitor-body {
                display: none;
            }
            
            .ai-monitor-body {
                max-height: 250px;
                font-size: 11px;
                padding: 8px 12px;
            }
            
            .ai-monitor-header {
                padding: 8px 12px;
            }
            
            .ai-monitor-header .monitor-title {
                font-size: 13px;
            }
            
            .ai-monitor-header .monitor-status {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <a href="/" style="text-decoration: none; color: inherit;"><h1>🍇 Intelly Jelly</h1></a>
            </div>
            <div class="header-right">
                <div class="nav-links">
                    <a href="/">Downloads</a>
                    <a href="/library">Library</a>
                    <a href="/logs">Logs</a>
                    <a href="/settings">Settings</a>
                </div>
                <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">
                    <span id="theme-icon">🌙</span>
                </button>
            </div>
        </header>
        
        <div class="stats" id="stats">
            <div class="stat-item">
                <div class="stat-value" id="stat-total">0</div>
                <div class="stat-label">Total Jobs</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-queued">0</div>
                <div class="stat-label">Queued</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-processing">0</div>
                <div class="stat-label">Processing</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-pending">0</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-failed">0</div>
                <div class="stat-label">Failed</div>
            </div>
        </div>
        
        <div class="filter-bar">
            <div class="status-chips" id="status-chips">
                <span class="filter-chip chip-queued" data-status="Queued for AI" onclick="toggleStatusChip(this)">Queued</span>
                <span class="filter-chip chip-processing" data-status="Processing AI" onclick="toggleStatusChip(this)">Processing</span>
                <span class="filter-chip chip-pending" data-status="Pending Completion" onclick="toggleStatusChip(this)">Pending</span>
                <span class="filter-chip chip-failed" data-status="Failed" onclick="toggleStatusChip(this)">Failed</span>
            </div>
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-input" placeholder="Search jobs..." oninput="onFilterChange()">
                <button class="clear-search" id="clear-search" onclick="clearSearch()" title="Clear search">&times;</button>
            </div>
            <span class="filter-count" id="filter-count"></span>
        </div>
        
        <div class="ai-monitor" id="ai-monitor">
            <div class="ai-monitor-header" onclick="toggleMonitor()">
                <span class="monitor-title">
                    <span class="toggle-arrow">▶</span>
                    AI Monitor
                </span>
                <span class="monitor-status">
                    <span class="monitor-dot disconnected" id="monitor-dot"></span>
                    <span id="monitor-status-text">disconnected</span>
                </span>
            </div>
            <div class="ai-monitor-body" id="ai-monitor-body">
                <div class="ai-monitor-empty">Waiting for jobs...</div>
            </div>
        </div>
        
        <div class="jobs-container">
            <div class="jobs-header">
                <h2>Active Jobs</h2>
                <button class="refresh-btn" onclick="loadJobs()">Refresh</button>
            </div>
            
            <div id="jobs-list"></div>
        </div>
    </div>
    
    <div class="modal" id="edit-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Job</h3>
                <button class="close-btn" onclick="closeEditModal()">&times;</button>
            </div>
            <div class="form-group">
                <label>New Name</label>
                <input type="text" id="edit-name" placeholder="Enter new file name">
            </div>
            <div class="form-actions">
                <button class="btn-secondary" onclick="closeEditModal()">Cancel</button>
                <button class="btn-primary" onclick="saveEdit()">Save</button>
            </div>
        </div>
    </div>
    
    <div class="modal" id="reai-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Re-AI Job</h3>
                <button class="close-btn" onclick="closeReAIModal()">&times;</button>
            </div>
            <div class="form-group">
                <label>Custom Prompt (optional)</label>
                <textarea id="reai-prompt" placeholder="Enter custom instructions for the AI..."></textarea>
            </div>
            <div class="form-group">
                <label>AI Processing Options</label>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="reai-include-instructions" checked>
                        <span>Include instructions</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="reai-include-filename" checked>
                        <span>Include original filename</span>
                    </label>
                </div>
            </div>
            <div class="form-actions">
                <button class="btn-secondary" onclick="closeReAIModal()">Cancel</button>
                <button class="btn-primary" onclick="saveReAI()">Regen</button>
            </div>
        </div>
    </div>
    
    <script>
        function setCookie(name, value, days = 365) {
            const date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            const expires = "expires=" + date.toUTCString();
            document.cookie = name + "=" + value + ";" + expires + ";path=/;SameSite=Lax";
        }
        
        function getCookie(name) {
            const nameEQ = name + "=";
            const ca = document.cookie.split(';');
            for (let i = 0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) == ' ') c = c.substring(1, c.length);
                if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length, c.length);
            }
            return null;
        }
        
        function initTheme() {
            const savedTheme = getCookie('intelly-jelly-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
        }
        
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            setCookie('intelly-jelly-theme', newTheme);
            updateThemeIcon(newTheme);
        }
        
        function updateThemeIcon(theme) {
            const icon = document.getElementById('theme-icon');
            icon.textContent = theme === 'dark' ? '🌙' : '☀️';
        }
        
        initTheme();
        
        let currentJobId = null;
        let allJobs = [];
        let sortColumn = 'created_at';
        let sortDir = 'asc';
        
        function getStatusClass(status) {
            const statusMap = {
                'Queued for AI': 'status-queued',
                'Processing AI': 'status-processing',
                'Pending Completion': 'status-pending',
                'Completed': 'status-completed',
                'Failed': 'status-failed',
                'Manual Edit': 'status-manual'
            };
            return statusMap[status] || 'status-queued';
        }
        
        function readUrlParams() {
            const p = new URLSearchParams(window.location.search);
            return {
                search: p.get('search') || '',
                statuses: p.get('status') ? p.get('status').split(',') : ['Queued for AI', 'Processing AI', 'Pending Completion', 'Failed'],
                sort: p.get('sort') || 'created_at',
                order: p.get('order') || 'asc'
            };
        }
        
        function writeUrlParams() {
            const p = new URLSearchParams();
            const searchVal = document.getElementById('search-input').value.trim();
            if (searchVal) p.set('search', searchVal);
            
            const activeStatuses = getActiveStatuses();
            const defaultStatuses = ['Queued for AI', 'Processing AI', 'Pending Completion', 'Failed'];
            if (JSON.stringify(activeStatuses.sort()) !== JSON.stringify(defaultStatuses.sort())) {
                p.set('status', activeStatuses.join(','));
            }
            
            if (sortColumn !== 'created_at') p.set('sort', sortColumn);
            if (sortDir !== 'asc') p.set('order', sortDir);
            
            const qs = p.toString();
            const newUrl = window.location.pathname + (qs ? '?' + qs : '');
            if (window.location.search !== (qs ? '?' + qs : '')) {
                window.history.replaceState({}, '', newUrl);
            }
        }
        
        function applyUrlParams() {
            const params = readUrlParams();
            document.getElementById('search-input').value = params.search;
            sortColumn = params.sort;
            sortDir = params.order;
            
            const chips = document.querySelectorAll('#status-chips .filter-chip');
            chips.forEach(chip => {
                const active = params.statuses.includes(chip.dataset.status);
                if (active) {
                    chip.classList.remove('inactive');
                } else {
                    chip.classList.add('inactive');
                }
            });
            
            updateClearButton();
        }
        
        function getActiveStatuses() {
            const chips = document.querySelectorAll('#status-chips .filter-chip');
            const statuses = [];
            chips.forEach(chip => {
                if (!chip.classList.contains('inactive')) {
                    statuses.push(chip.dataset.status);
                }
            });
            return statuses;
        }
        
        function toggleStatusChip(chip) {
            chip.classList.toggle('inactive');
            onFilterChange();
        }
        
        function onFilterChange() {
            updateClearButton();
            writeUrlParams();
            renderJobs();
        }
        
        function clearSearch() {
            document.getElementById('search-input').value = '';
            updateClearButton();
            writeUrlParams();
            renderJobs();
        }
        
        function updateClearButton() {
            const btn = document.getElementById('clear-search');
            const hasText = document.getElementById('search-input').value.trim().length > 0;
            btn.style.display = hasText ? 'block' : 'none';
        }
        
        function sortBy(column) {
            if (sortColumn === column) {
                sortDir = sortDir === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = column;
                sortDir = 'asc';
            }
            writeUrlParams();
            renderJobs();
        }
        
        function getSortArrow(column) {
            if (sortColumn !== column) return '<span class="sort-arrow">↕</span>';
            return sortDir === 'asc' 
                ? '<span class="sort-arrow active">▲</span>' 
                : '<span class="sort-arrow active">▼</span>';
        }
        
        function compareJobs(a, b) {
            let valA, valB;
            switch (sortColumn) {
                case 'path':
                    valA = a.relative_path.toLowerCase();
                    valB = b.relative_path.toLowerCase();
                    break;
                case 'status':
                    valA = a.status.toLowerCase();
                    valB = b.status.toLowerCase();
                    break;
                case 'name':
                    valA = (a.ai_determined_name || '').toLowerCase();
                    valB = (b.ai_determined_name || '').toLowerCase();
                    break;
                case 'confidence':
                    valA = a.confidence !== null ? a.confidence : -1;
                    valB = b.confidence !== null ? b.confidence : -1;
                    break;
                case 'created_at':
                default:
                    valA = a.created_at;
                    valB = b.created_at;
                    break;
            }
            if (valA < valB) return sortDir === 'asc' ? -1 : 1;
            if (valA > valB) return sortDir === 'asc' ? 1 : -1;
            return 0;
        }
        
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const stats = await response.json();
                
                document.getElementById('stat-total').textContent = stats.total;
                document.getElementById('stat-queued').textContent = stats.queued;
                document.getElementById('stat-processing').textContent = stats.processing;
                document.getElementById('stat-pending').textContent = stats.pending;
                document.getElementById('stat-failed').textContent = stats.failed;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        
        async function loadJobs() {
            try {
                const response = await fetch('/api/jobs');
                allJobs = await response.json();
                renderJobs();
            } catch (error) {
                console.error('Error loading jobs:', error);
            }
        }
        
        function renderJobs() {
            const searchTerm = document.getElementById('search-input').value.trim().toLowerCase();
            const activeStatuses = getActiveStatuses();
            
            let filtered = allJobs.filter(job => {
                if (!activeStatuses.includes(job.status)) return false;
                if (searchTerm) {
                    const path = (job.relative_path || '').toLowerCase();
                    const name = (job.ai_determined_name || '').toLowerCase();
                    if (!path.includes(searchTerm) && !name.includes(searchTerm)) return false;
                }
                return true;
            });
            
            filtered.sort(compareJobs);
            
            const jobsList = document.getElementById('jobs-list');
            const filterCount = document.getElementById('filter-count');
            filterCount.textContent = `Showing ${filtered.length} of ${allJobs.length} jobs`;
            
            if (filtered.length === 0) {
                let emptyMsg = 'No jobs found matching your filters.';
                if (allJobs.length === 0) {
                    emptyMsg = 'No jobs yet. Add files to the downloading folder to get started.';
                }
                jobsList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📁</div>
                        <p>${emptyMsg}</p>
                    </div>
                `;
                return;
            }
            
            let html = `
                <table class="jobs-table">
                    <thead>
                        <tr>
                            <th class="sortable" onclick="sortBy('created_at')"># ${getSortArrow('created_at')}</th>
                            <th class="sortable" onclick="sortBy('path')">Original Path ${getSortArrow('path')}</th>
                            <th class="sortable" onclick="sortBy('status')">Status ${getSortArrow('status')}</th>
                            <th class="sortable" onclick="sortBy('name')">New Name ${getSortArrow('name')}</th>
                            <th class="sortable" onclick="sortBy('confidence')">Confidence ${getSortArrow('confidence')}</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            filtered.forEach((job, idx) => {
                let retryInfo = '';
                if (job.status === 'Failed' && job.retry_count !== undefined && job.max_retries !== undefined) {
                    retryInfo = ` (Attempt ${job.retry_count}/${job.max_retries})`;
                }
                
                let errorRow = '';
                if (job.status === 'Failed' && job.error_message) {
                    errorRow = `
                    <tr>
                        <td colspan="6" class="error-message">
                            <strong>Error:</strong> ${job.error_message}
                        </td>
                    </tr>
                    `;
                }
                
                html += `
                    <tr>
                        <td style="color: var(--text-secondary);">${idx + 1}</td>
                        <td>${job.relative_path}</td>
                        <td><span class="status-badge ${getStatusClass(job.status)}">${job.status}${retryInfo}</span></td>
                        <td>${job.ai_determined_name || '-'}</td>
                        <td>${job.confidence !== null ? job.confidence + '%' : '-'}</td>
                        <td>
                            <div class="actions">
                                <button class="btn btn-edit" onclick="openEditModal('${job.job_id}', '${job.ai_determined_name || job.relative_path}')">Edit</button>
                                <button class="btn btn-reai" onclick="openReAIModal('${job.job_id}')">Re-AI</button>
                            </div>
                        </td>
                    </tr>
                    ${errorRow}
                `;
            });
            
            html += `
                    </tbody>
                </table>
            `;
            
            jobsList.innerHTML = html;
        }
        
        function openEditModal(jobId, currentName) {
            currentJobId = jobId;
            document.getElementById('edit-name').value = currentName;
            document.getElementById('edit-modal').classList.add('active');
        }
        
        function closeEditModal() {
            document.getElementById('edit-modal').classList.remove('active');
            currentJobId = null;
        }
        
        async function saveEdit() {
            const newName = document.getElementById('edit-name').value;
            
            if (!newName) {
                alert('Please enter a new name');
                return;
            }
            
            try {
                const response = await fetch(`/api/jobs/${currentJobId}/edit`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        new_name: newName,
                        new_path: null
                    })
                });
                
                if (response.ok) {
                    closeEditModal();
                    loadJobs();
                    loadStats();
                } else {
                    alert('Error updating job');
                }
            } catch (error) {
                console.error('Error saving edit:', error);
                alert('Error updating job');
            }
        }
        
        async function openReAIModal(jobId) {
            currentJobId = jobId;
            document.getElementById('reai-prompt').value = '';
            document.getElementById('reai-modal').classList.add('active');
        }
        
        function closeReAIModal() {
            document.getElementById('reai-modal').classList.remove('active');
            currentJobId = null;
        }
        
        async function saveReAI() {
            let customPrompt = document.getElementById('reai-prompt').value;
            const includeInstructions = document.getElementById('reai-include-instructions').checked;
            const includeFilename = document.getElementById('reai-include-filename').checked;
            
            if (!includeInstructions && customPrompt) {
                const jsonInstructions = '\n\nIMPORTANT: Return your response as a JSON array with the following structure:\n' +
                    '[{\n' +
                    '  "original_path": "original filename",\n' +
                    '  "suggested_name": "your suggested name",\n' +
                    '  "confidence": 0-100\n' +
                    '}]';
                customPrompt = customPrompt + jsonInstructions;
            }
            
            try {
                const response = await fetch(`/api/jobs/${currentJobId}/re-ai`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        custom_prompt: customPrompt || null,
                        include_instructions: includeInstructions,
                        include_filename: includeFilename
                    })
                });
                
                if (response.ok) {
                    closeReAIModal();
                    loadJobs();
                    loadStats();
                } else {
                    alert('Error queuing job for re-processing');
                }
            } catch (error) {
                console.error('Error saving re-AI:', error);
                alert('Error queuing job for re-processing');
            }
        }
        
        let monitorEs = null;
        let monitorLog = [];
        
        function toggleMonitor() {
            const panel = document.getElementById('ai-monitor');
            panel.classList.toggle('collapsed');
            const arrow = panel.querySelector('.toggle-arrow');
            arrow.textContent = panel.classList.contains('collapsed') ? '▶' : '▼';
        }
        
        function setMonitorStatus(status, text) {
            const dot = document.getElementById('monitor-dot');
            const statusText = document.getElementById('monitor-status-text');
            dot.className = 'monitor-dot ' + status;
            statusText.textContent = text;
        }
        
        function formatTime(ts) {
            const d = new Date(ts);
            return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        
        function addMonitorEvent(event) {
            if (event.type === 'job_started') {
                monitorLog = [];
            }
            monitorLog.push(event);
            renderMonitorLog();
        }
        
        function renderMonitorLog() {
            const body = document.getElementById('ai-monitor-body');
            
            if (monitorLog.length === 0) {
                body.innerHTML = '<div class="ai-monitor-empty">Waiting for jobs...</div>';
                return;
            }
            
            let html = '';
            for (const ev of monitorLog) {
                const time = formatTime(ev.ts);
                let icon = '';
                let msg = '';
                
                switch (ev.type) {
                    case 'job_started':
                        icon = '▶';
                        msg = `Processing: ${ev.file}`;
                        break;
                    case 'thinking':
                        icon = '💭';
                        msg = ev.message;
                        break;
                    case 'api_request':
                        icon = '📡';
                        msg = `Sending to ${ev.provider} (${ev.model})`;
                        if (ev.tools && ev.tools.length) msg += ` [tools: ${ev.tools.join(', ')}]`;
                        break;
                    case 'api_response':
                        icon = '📥';
                        msg = `Response received`;
                        if (ev.duration_ms) msg += ` (${ev.duration_ms}ms)`;
                        if (ev.turn && ev.turn > 1) msg += ` — turn ${ev.turn}`;
                        break;
                    case 'tool_started':
                        icon = '🔧';
                        msg = `Calling: ${ev.tool}`;
                        if (ev.args) msg += `(${ev.args})`;
                        break;
                    case 'tool_completed':
                        icon = '✅';
                        msg = `${ev.tool} complete`;
                        break;
                    case 'result':
                        icon = '⭐';
                        msg = `Got result (${ev.confidence}% confidence)`;
                        if (ev.file_count > 1) msg += ` — ${ev.file_count} files`;
                        break;
                    case 'job_done':
                        icon = '✔';
                        msg = `Job complete`;
                        if (ev.name) msg += ` → ${ev.name}`;
                        if (ev.confidence !== undefined) msg += ` (${ev.confidence}%)`;
                        break;
                    case 'job_error':
                        icon = '✖';
                        msg = `Error: ${ev.error}`;
                        break;
                    default:
                        icon = '·';
                        msg = JSON.stringify(ev);
                }
                
                html += `<div class="ai-event type-${ev.type}"><span class="event-time">${time}</span><span class="event-icon">${icon}</span><span class="event-msg">${msg}</span></div>`;
            }
            
            body.innerHTML = html;
            body.scrollTop = body.scrollHeight;
        }
        
        function initMonitor() {
            setMonitorStatus('idle', 'connecting...');
            
            monitorEs = new EventSource('/api/ai-events/stream');
            
            monitorEs.onopen = function() {
                setMonitorStatus('connected', 'connected');
            };
            
            monitorEs.onmessage = function(e) {
                try {
                    const event = JSON.parse(e.data);
                    addMonitorEvent(event);
                } catch (err) {
                    console.error('SSE parse error:', err);
                }
            };
            
            monitorEs.onerror = function() {
                setMonitorStatus('disconnected', 'disconnected');
                monitorEs.close();
                setTimeout(initMonitor, 3000);
            };
        }
        
        applyUrlParams();
        
        if (window.innerWidth <= 768) {
            document.getElementById('ai-monitor').classList.add('collapsed');
        }
        
        initMonitor();
        loadJobs();
        loadStats();
        
        setInterval(() => {
            loadJobs();
            loadStats();
        }, 3000);
    </script>
</body>
</html>
